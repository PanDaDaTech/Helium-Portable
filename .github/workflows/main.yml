name: CI

on:
  schedule:
    - cron: '0 0 * * *' # UTC 00:00, Beijing 08:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.compare.outputs.should_run }}
      chrome_plus_tag: ${{ steps.compare.outputs.chrome_plus_tag }}
      helium_tag: ${{ steps.compare.outputs.helium_tag }}
    steps:
      - name: Compare versions
        id: compare
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          cur_ver="$(gh release view --repo "${{ github.repository }}" --json tagName -q '.tagName' 2>/dev/null || echo "")"
          latest_helium="$(gh release view --repo imputnet/helium-windows --json tagName -q '.tagName')"
          latest_plus="$(gh release view --repo Bush2021/chrome_plus --json tagName -q '.tagName')"

          latest_helium="${latest_helium#v}"
          latest_plus="${latest_plus#v}"

          echo "chrome_plus_tag=$latest_plus" >> "$GITHUB_OUTPUT"
          echo "helium_tag=$latest_helium" >> "$GITHUB_OUTPUT"

          cur_helium="" cur_plus=""
          if [[ "$cur_ver" == *"+"* ]]; then
            cur_helium="${cur_ver%%+*}"; cur_helium="${cur_helium#v}"
            cur_plus="${cur_ver#*+}"; cur_plus="${cur_plus#v}"
          fi

          if [[ -z "$cur_ver" || -z "$cur_helium" || -z "$cur_plus" ]]; then
            echo "should_run=release" >> "$GITHUB_OUTPUT"
          elif [[ "$cur_plus" != "$latest_plus" ]]; then
            echo "should_run=release" >> "$GITHUB_OUTPUT"
          elif [[ "$cur_helium" != "$latest_helium" ]]; then
            echo "should_run=prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=" >> "$GITHUB_OUTPUT"
          fi

  build:
    runs-on: ubuntu-latest
    needs: check
    if: ${{ needs.check.outputs.should_run || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Download releases
        uses: robinraju/release-downloader@main
        with:
          repository: imputnet/helium-windows
          tag: ${{ needs.check.outputs.helium_tag }}
          fileName: 'helium_*_x64-windows.zip'
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: robinraju/release-downloader@main
        with:
          repository: Bush2021/chrome_plus
          tag: ${{ needs.check.outputs.chrome_plus_tag }}
          fileName: 'Chrome++_*_x86_x64_arm64.7z'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install 7z
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Build portable package
        id: build
        shell: bash
        run: |
          set -euo pipefail

          # Parse versions from filenames
          helium_zip="$(find . -maxdepth 1 -name 'helium_*_x64-windows.zip' -printf '%f\n' | head -1)"
          plus_7z="$(find . -maxdepth 1 -name 'Chrome++_*_x86_x64_arm64.7z' -printf '%f\n' | head -1)"
          helium_ver="${helium_zip#helium_}"; helium_ver="${helium_ver%_x64-windows.zip}"; helium_ver="${helium_ver#v}"
          plus_ver="${plus_7z#Chrome++_}"; plus_ver="${plus_ver%_x86_x64_arm64.7z}"; plus_ver="${plus_ver#v}"
          release_tag="${helium_ver}+${plus_ver}"
          package_dir="helium_${release_tag}_x64-windows"

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "package_dir=$package_dir" >> "$GITHUB_OUTPUT"

          # Extract
          7z x "$helium_zip" -ohelium_extract
          7z x "$plus_7z" -ochrome_plus_extract

          # Locate source dirs
          chrome_plus_x64="$(dirname "$(dirname "$(find chrome_plus_extract -path '*/x64/App/chrome++.ini' -print -quit)")")"
          helium_root="$(dirname "$(find helium_extract -name 'chrome.exe' -print -quit)")"

          # Assemble package
          mkdir -p "$package_dir/App"
          cp -a "$chrome_plus_x64/." "$package_dir/"
          cp -a "$helium_root/." "$package_dir/App/"
          cp -a "$chrome_plus_x64/App/chrome++.ini" "$package_dir/App/"
          cp -a "$chrome_plus_x64/App/version.dll" "$package_dir/App/"

          # Keep only zh-CN and en-US locales
          find "$package_dir/App/locales" -type f ! -name 'zh-CN.pak' ! -name 'en-US.pak' -delete

          # Version marker
          touch "$package_dir/$release_tag"

          # Verify
          test -f "$package_dir/App/chrome.exe"
          test -f "$package_dir/App/chrome++.ini"
          test -f "$package_dir/App/version.dll"
          test -d "$package_dir/Cache"
          test -d "$package_dir/Data"
          echo "Package built: $package_dir"
          ls "$package_dir"

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: ${{ steps.build.outputs.package_dir }}
          path: ${{ steps.build.outputs.package_dir }}

      - name: Create release archive
        if: ${{ needs.check.outputs.should_run && github.event_name != 'workflow_dispatch' || github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: zip -r "${{ steps.build.outputs.package_dir }}.zip" "${{ steps.build.outputs.package_dir }}"

      - name: Publish release
        if: ${{ needs.check.outputs.should_run == 'release' && github.event_name != 'workflow_dispatch' }}
        uses: softprops/action-gh-release@master
        with:
          name: ${{ steps.build.outputs.release_tag }}
          tag_name: ${{ steps.build.outputs.release_tag }}
          fail_on_unmatched_files: true
          files: ${{ steps.build.outputs.package_dir }}.zip
          body: |
            Portable Helium packaged with Chrome++. Release follows Chrome++ updates.

            Sources: [Helium Windows](https://github.com/imputnet/helium-windows) | [Chrome++](https://github.com/Bush2021/chrome_plus)

      - name: Publish prerelease
        if: ${{ needs.check.outputs.should_run == 'prerelease' && github.event_name != 'workflow_dispatch' }}
        uses: softprops/action-gh-release@master
        with:
          prerelease: true
          name: ${{ steps.build.outputs.release_tag }}
          tag_name: ${{ steps.build.outputs.release_tag }}
          fail_on_unmatched_files: true
          files: ${{ steps.build.outputs.package_dir }}.zip
          body: |
            Portable Helium packaged with Chrome++. Prerelease follows Helium updates.

            Sources: [Helium Windows](https://github.com/imputnet/helium-windows) | [Chrome++](https://github.com/Bush2021/chrome_plus)

      - name: Publish draft (manual trigger)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: softprops/action-gh-release@master
        with:
          draft: true
          name: ${{ steps.build.outputs.release_tag }}
          tag_name: ${{ steps.build.outputs.release_tag }}
          fail_on_unmatched_files: true
          files: ${{ steps.build.outputs.package_dir }}.zip
          body: |
            Manually triggered draft release.

            Sources: [Helium Windows](https://github.com/imputnet/helium-windows) | [Chrome++](https://github.com/Bush2021/chrome_plus)

