name: CI

on:
  schedule:
    - cron: '0 0 * * *' # UTC 00:00, Beijing 08:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.compare.outputs.should_run }}
      chrome_plus_tag: ${{ steps.compare.outputs.chrome_plus_tag }}
      helium_tag: ${{ steps.compare.outputs.helium_tag }}
    steps:
      - name: Compare versions
        id: compare
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          cur_ver="$(gh release view --repo "${{ github.repository }}" --json tagName -q '.tagName' 2>/dev/null || echo "")"
          latest_helium="$(gh release view --repo imputnet/helium-windows --json tagName -q '.tagName')"
          latest_plus="$(gh release view --repo Bush2021/chrome_plus --json tagName -q '.tagName')"

          latest_helium="${latest_helium#v}"
          latest_plus="${latest_plus#v}"

          echo "chrome_plus_tag=$latest_plus" >> "$GITHUB_OUTPUT"
          echo "helium_tag=$latest_helium" >> "$GITHUB_OUTPUT"

          cur_helium=""
          if [[ "$cur_ver" == *"+"* ]]; then
            cur_helium="${cur_ver%%+*}"; cur_helium="${cur_helium#v}"
          fi

          should_run=""
          reason="helium is up to date"
          if [[ -z "$cur_ver" || -z "$cur_helium" ]]; then
            should_run="true"
            reason="current release is missing or not in helium+chrome_plus format"
          elif [[ "$cur_helium" != "$latest_helium" ]]; then
            should_run="true"
            reason="helium changed: current=$cur_helium latest=$latest_helium"
          fi

          echo "current_release=${cur_ver:-<none>}"
          echo "current_helium=${cur_helium:-<none>}"
          echo "latest_helium=$latest_helium"
          echo "latest_chrome_plus=$latest_plus"
          echo "should_run=${should_run:-false} ($reason)"

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: check
    if: ${{ needs.check.outputs.should_run || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Download Helium x64
        uses: robinraju/release-downloader@main
        with:
          repository: imputnet/helium-windows
          tag: ${{ needs.check.outputs.helium_tag }}
          fileName: 'helium_*_x64-installer.exe'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Helium arm64
        uses: robinraju/release-downloader@main
        with:
          repository: imputnet/helium-windows
          tag: ${{ needs.check.outputs.helium_tag }}
          fileName: 'helium_*_arm64-installer.exe'
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: robinraju/release-downloader@main
        with:
          repository: Bush2021/chrome_plus
          tag: ${{ needs.check.outputs.chrome_plus_tag }}
          fileName: 'Chrome++_*_x86_x64_arm64.7z'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install 7z
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Build portable packages
        id: build
        shell: bash
        run: |
          set -euo pipefail

          # Parse versions from filenames
          helium_x64_exe="$(find . -maxdepth 1 -name 'helium_*_x64-installer.exe' -printf '%f\n' | head -1)"
          helium_arm64_exe="$(find . -maxdepth 1 -name 'helium_*_arm64-installer.exe' -printf '%f\n' | head -1)"
          plus_7z="$(find . -maxdepth 1 -name 'Chrome++_*_x86_x64_arm64.7z' -printf '%f\n' | head -1)"
          helium_ver="${helium_x64_exe#helium_}"; helium_ver="${helium_ver%_x64-installer.exe}"; helium_ver="${helium_ver#v}"
          plus_ver="${plus_7z#Chrome++_}"; plus_ver="${plus_ver%_x86_x64_arm64.7z}"; plus_ver="${plus_ver#v}"
          release_tag="${helium_ver}+${plus_ver}"

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "x64_package_dir=helium_${release_tag}_x64-windows" >> "$GITHUB_OUTPUT"
          echo "arm64_package_dir=helium_${release_tag}_arm64-windows" >> "$GITHUB_OUTPUT"

          # Extract exe installers with 7z (NSIS outer layer)
          7z x "$helium_x64_exe" -ohelium_x64_extract
          7z x "$helium_arm64_exe" -ohelium_arm64_extract
          7z x "$plus_7z" -ochrome_plus_extract

          # NSIS installers contain embedded archives — extract them to get actual browser files
          for arch in x64 arm64; do
            inner_archive="$(find "helium_${arch}_extract" -name '*.7z' -o -name '*.7z.001' | sort | head -1)"
            if [[ -n "$inner_archive" ]]; then
              echo "Extracting inner archive: $inner_archive"
              mkdir -p "helium_${arch}_files"
              7z x "$inner_archive" "-ohelium_${arch}_files" -aoa
            fi
          done

          for arch in x64 arm64; do
            echo "=== Building $arch package ==="
            package_dir="helium_${release_tag}_${arch}-windows"

            # Locate source dirs for current arch
            chrome_plus_arch="$(dirname "$(dirname "$(find chrome_plus_extract -path "*/${arch}/App/chrome++.ini" -print -quit)")")"
            helium_root="$(dirname "$(find "helium_${arch}_files" -name 'chrome.exe' -print -quit 2>/dev/null)")"

            if [[ -z "$helium_root" || "$helium_root" == "." ]]; then
              echo "ERROR: chrome.exe not found in helium_${arch}_files"
              echo "--- Directory tree (depth 3) ---"
              find "helium_${arch}_files" -maxdepth 3 | head -50
              exit 1
            fi

            # Assemble package
            mkdir -p "$package_dir/App"
            cp -a "$chrome_plus_arch/." "$package_dir/"
            cp -a "$helium_root/." "$package_dir/App/"
            cp -a "$chrome_plus_arch/App/chrome++.ini" "$package_dir/App/"
            cp -a "$chrome_plus_arch/App/version.dll" "$package_dir/App/"

            # Keep only zh-CN and en-US locales (inside version-numbered subfolder)
            ver_dir="$(find "$package_dir/App" -maxdepth 1 -mindepth 1 -type d -name "${helium_ver}" -print -quit)"
            if [[ -n "$ver_dir" && -d "$ver_dir/locales" ]]; then
              find "$ver_dir/locales" -type f ! -name 'zh-CN.pak' ! -name 'en-US.pak' -delete
            fi

            # Version marker
            touch "$package_dir/$release_tag"

            # Verify
            test -f "$package_dir/App/chrome.exe"
            test -f "$package_dir/App/chrome++.ini"
            test -f "$package_dir/App/version.dll"
            test -d "$package_dir/Cache"
            test -d "$package_dir/Data"
            echo "Package built: $package_dir"
            ls "$package_dir"
          done

      - name: Upload x64 Artifact
        uses: actions/upload-artifact@main
        with:
          name: ${{ steps.build.outputs.x64_package_dir }}
          path: ${{ steps.build.outputs.x64_package_dir }}

      - name: Upload arm64 Artifact
        uses: actions/upload-artifact@main
        with:
          name: ${{ steps.build.outputs.arm64_package_dir }}
          path: ${{ steps.build.outputs.arm64_package_dir }}

      - name: Create release archives
        shell: bash
        run: |
          7z a "${{ steps.build.outputs.x64_package_dir }}.7z" "${{ steps.build.outputs.x64_package_dir }}"
          7z a "${{ steps.build.outputs.arm64_package_dir }}.7z" "${{ steps.build.outputs.arm64_package_dir }}"

      - name: Publish release
        if: ${{ needs.check.outputs.should_run && github.event_name != 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "${{ steps.build.outputs.release_tag }}" \
            "${{ steps.build.outputs.x64_package_dir }}.7z" \
            "${{ steps.build.outputs.arm64_package_dir }}.7z" \
            --repo "${{ github.repository }}" \
            --title "${{ steps.build.outputs.release_tag }}" \
            --notes "Portable Helium packaged with Chrome++. Available for x64 and arm64.
          Release follows Helium Windows updates.

          Sources: [Helium Windows](https://github.com/imputnet/helium-windows) | [Chrome++](https://github.com/Bush2021/chrome_plus)"

      - name: Publish draft (manual trigger)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "${{ steps.build.outputs.release_tag }}" \
            "${{ steps.build.outputs.x64_package_dir }}.7z" \
            "${{ steps.build.outputs.arm64_package_dir }}.7z" \
            --repo "${{ github.repository }}" \
            --title "${{ steps.build.outputs.release_tag }}" \
            --draft \
            --notes "Manually triggered draft release. Available for x64 and arm64.

          Sources: [Helium Windows](https://github.com/imputnet/helium-windows) | [Chrome++](https://github.com/Bush2021/chrome_plus)"

